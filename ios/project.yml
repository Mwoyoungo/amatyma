name: Amatyma
options:
  bundleIdPrefix: com.lokaleza
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

targets:
  Amatyma:
    type: application
    platform: iOS
    sources:
      - path: Amatyma
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lokaleza.amatyma
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Amatyma
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Amatyma needs access to your photos to share posts and stories."
        INFOPLIST_KEY_NSCameraUsageDescription: "Amatyma needs your camera to record videos and stories."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseFunctions
      - package: Firebase
        product: FirebaseMessaging
